name: Daily Divergence Scan

on:
  schedule:
    - cron: '15 10 * * 1-5'   # 3:45 PM IST (10:15 UTC), Mon–Fri after market close
  workflow_dispatch:            # also allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run divergence scanner
        run: python scan.py

      - name: Commit and push updated report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html divergence_results.csv
          git diff --cached --quiet || git commit -m "Daily scan: $(date +'%Y-%m-%d %H:%M IST')"
          git push
