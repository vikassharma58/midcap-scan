name: Daily Divergence Scan

on:
  schedule:
    - cron: '30 15 * * 1-5'    # 9:00 PM IST (15:30 UTC), Mon–Fri
  workflow_dispatch:            # also allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run divergence scanner
        run: python scan.py

      - name: Commit and push updated report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html divergence_results.csv
          git diff --cached --quiet || git commit -m "Daily scan: $(date +'%Y-%m-%d %H:%M IST')"
          git push

      - name: Send email summary
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RECIPIENT:      vikassharma58@gmail.com
        run: python send_email.py
